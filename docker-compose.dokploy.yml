# ================================================
# PataCerta — Docker Compose for Dokploy
# ================================================
# Deploy as "Docker Compose" resource in Dokploy.
# Configure domain on the "web" service via Dokploy UI > Domains tab.
#
# Required env vars (set in Dokploy > Environment tab):
#   POSTGRES_PASSWORD    — strong random password
#   JWT_SECRET           — random 64-char string
#   JWT_REFRESH_SECRET   — random 64-char string
#   ADMIN_EMAIL          — super-admin email
#   ADMIN_PASSWORD       — super-admin password (min 8 chars, upper+lower+number)
#   MINIO_ROOT_PASSWORD  — strong random password for MinIO
#   FRONTEND_URL         — your public URL (e.g. https://patacerta.pt)
#
# SEO env vars (per-environment — production vs stage):
#   VITE_PUBLIC_URL  — domínio canónico que vai parar a `<link rel=canonical>`,
#                     `og:url` e URLs em JSON-LD. Build-time (Vite). Define:
#                       prod:  https://patacerta.pt
#                       stage: https://stage.patacerta.pt
#   ROBOTS_HEADER    — string nginx injectada no server block. Em prod
#                     deixar vazio. Em stage definir:
#                       add_header X-Robots-Tag "noindex, nofollow" always;
#                     (impede o stage de aparecer em motores de pesquisa).
#
# Stripe (pagamentos):
#   STRIPE_SECRET_KEY              — sk_test_... (stage) / sk_live_... (prod)
#   STRIPE_WEBHOOK_SECRET          — whsec_... do endpoint criado no dashboard
#   VITE_STRIPE_PUBLISHABLE_KEY    — pk_test_... / pk_live_... (build-arg, web)
#
# SMTP (emails transacionais — verificacao, reset password, Stripe receipts):
#   Provider recomendado: Mailgun EU (smtp.eu.mailgun.org).
#   Setup:
#     1. Criar conta em mailgun.com, escolher EU region durante setup.
#     2. Adicionar dominio patacerta.pt > seguir instrucoes DNS:
#        - SPF (TXT): "v=spf1 include:mailgun.org ~all"
#        - DKIM (TXT): valor especifico fornecido pelo painel
#        - MX (opcional, so' se receber emails): mxa.eu.mailgun.org / mxb.eu.mailgun.org
#     3. Aguardar verificacao (~10 min apos DNS propagado).
#     4. SMTP credentials > criar user "noreply@patacerta.pt".
#     5. Definir no painel Dokploy:
#        SMTP_HOST=smtp.eu.mailgun.org
#        SMTP_PORT=587
#        SMTP_SECURE=false
#        SMTP_USER=postmaster@mg.patacerta.pt   # ou o user criado
#        SMTP_PASS=<mailgun-smtp-password>
#        SMTP_FROM=Patacerta <noreply@patacerta.pt>
#
#   Em prod, SMTP_HOST e' obrigatorio (fail-fast em apps/api/src/index.ts).
#   Escape hatch: ALLOW_NO_SMTP_IN_PROD=1 (nao recomendado, emails apenas
#   logados em consola).
#
# Backups (Postgres + MinIO uploads, encriptados com age):
#   AGE_RECIPIENT             — chave publica age (age1...). Encripta backups.
#                               Gerar localmente:
#                                 age-keygen -o ~/patacerta-backup-key.txt
#                               Guarda o ficheiro OFFLINE (USB, 1Password, etc).
#                               Copiar a linha "# public key: age1..." para esta var.
#                               A chave privada NUNCA deve estar no servidor.
#
#   MINIO_BACKUP_BUCKET       — bucket alvo dos backups (default: patacerta-backups).
#                               Criado automaticamente pelo primeiro backup.
#
#   Healthchecks.io (dead-man-switch — recomendado):
#     1. Criar conta gratuita em https://healthchecks.io
#     2. Criar 3 checks (Period: 1 day, Grace: 2h):
#        - "patacerta-backup-postgres"
#        - "patacerta-backup-minio"
#        - "patacerta-backup-rotate"
#     3. Copiar URLs (formato: https://hc-ping.com/<uuid>) para:
#        HEALTHCHECKS_URL_BACKUP=https://hc-ping.com/...
#        HEALTHCHECKS_URL_BACKUP_MINIO=https://hc-ping.com/...
#        HEALTHCHECKS_URL_ROTATE=https://hc-ping.com/...
#     4. Configurar canal de notificacao (email/Slack/Discord) em healthchecks.io.
#
#   Politica GFS (override opcional via env):
#     RETENTION_DAILY=7 RETENTION_WEEKLY=4 RETENTION_MONTHLY=6
#
#   Restore: ver docs/RESTORE.md (runbook completo).
#
#   TODO Fase B: push offsite para Unraid via Cloudflare Tunnel.

services:
  # ── Frontend (nginx + SPA + /api reverse proxy) ──
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Vite resolve VITE_PUBLIC_URL em build-time; tem que vir como
        # build-arg, nao basta `environment:`. Default no Dockerfile
        # aponta para producao.
        VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-https://patacerta.pt}
        # Chave publica do Stripe (segura para incluir no bundle do
        # browser). Em stage usar pk_test_..., em prod pk_live_...
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    environment:
      # ROBOTS_HEADER e' aplicado em runtime via envsubst no template
      # do nginx (ver apps/web/Dockerfile + apps/web/nginx.conf.template).
      # Em prod fica vazio. Em stage definir:
      #   ROBOTS_HEADER='add_header X-Robots-Tag "noindex, nofollow" always;'
      ROBOTS_HEADER: ${ROBOTS_HEADER:-}
    networks:
      - dokploy-network
      - default
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://127.0.0.1:80/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Backend API ──
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3001'
    networks:
      - default
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: '3001'
      DATABASE_URL: postgresql://patacerta:${POSTGRES_PASSWORD}@postgres:5432/patacerta?schema=public&connection_limit=5&pool_timeout=20&connect_timeout=10&socket_timeout=30
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: '15m'
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: '7d'
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: patacerta
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: patacerta-uploads
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@patacerta.pt}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-AdminPass123!}
      # CORS_ORIGIN deve ser definido no painel Dokploy (Environment vars).
      # Se ausente, a API recai sobre FRONTEND_URL. '*' nao e' permitido
      # (credentials enabled — ver apps/api/src/index.ts).
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://patacerta.pt}
      # Lower-environment flags — do NOT enable in production
      RESET_DB_ON_BOOT: ${RESET_DB_ON_BOOT:-false}
      RUN_SEED_ON_BOOT: ${RUN_SEED_ON_BOOT:-false}
      AUTH_SKIP_EMAIL_VERIFICATION: ${AUTH_SKIP_EMAIL_VERIFICATION:-false}
      DISABLE_RATE_LIMITS: ${DISABLE_RATE_LIMITS:-false}
      # Stripe — definir no painel Dokploy. Em stage usar chaves de
      # teste (sk_test_..., whsec_...). Em prod chaves live.
      # STRIPE_WEBHOOK_SECRET é obtido após criar o endpoint webhook
      # no dashboard Stripe apontando para /api/webhooks/stripe.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Email — Resend (recomendado) ou SMTP. Obrigatorio em producao.
      # Resend: criar conta em resend.com, verificar dominio, obter API key.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Patacerta <noreply@patacerta.pt>}
      # SMTP alternativo (se nao usar Resend)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Patacerta <noreply@patacerta.pt>}
      # Escape hatches para arrancar prod sem email e com flags debug (NAO recomendado em uso normal).
      # Defaults a '1' para permitir primeiro deploy. Remover depois de configurar email.
      ALLOW_NO_SMTP_IN_PROD: ${ALLOW_NO_SMTP_IN_PROD:-1}
      ALLOW_INSECURE_FLAGS_IN_PROD: ${ALLOW_INSECURE_FLAGS_IN_PROD:-1}
      # Maintenance mode — set MAINTENANCE_MODE=1 in Dokploy to return 503 for all requests.
      # Use MAINTENANCE_BYPASS_KEY for admin access via X-Maintenance-Bypass header.
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-0}
      MAINTENANCE_BYPASS_KEY: ${MAINTENANCE_BYPASS_KEY:-}
    restart: unless-stopped
    healthcheck:
      # start_period generoso: o entrypoint corre backfill-slugs + detector
      # de drift + migrate deploy + seed + backfill stats antes de exec node.
      # Em stage observado ~67s end-to-end; 120s da margem para reparacoes.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/api/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ── Cron jobs ──
  # Reusa a mesma imagem do API (mesmo build context + Dockerfile), mas
  # sobrepoe o entrypoint para arrancar busybox crond em foreground em
  # vez do servidor Express. Compose/BuildKit fazem cache hit do layer
  # de build, portanto nao ha duplicacao real de tempo de build.
  #
  # Jobs agendados (ver apps/api/cron-entrypoint.sh):
  #   - backup-postgres:         diario 02:00 UTC
  #   - backup-minio (uploads):  diario 02:05 UTC
  #   - rotate-backups (GFS):    diario 02:30 UTC
  #   - expire-sponsored-slots:  horario (minuto 0 de cada hora UTC)
  #   - cleanup-refresh-tokens:  diario 03:00 UTC
  #
  # Sem porta exposta (nao serve trafego). Acede a Postgres/MinIO pela
  # mesma rede 'default'. Restart unless-stopped garante que se um job
  # individual falhar e levar o crond abaixo, o container reinicia.
  cron:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # DATABASE_URL — usado por jobs node E por backup-postgres.sh (via pg_dump).
      # connection_limit=2 chega para 2 jobs node sequenciais.
      DATABASE_URL: postgresql://patacerta:${POSTGRES_PASSWORD}@postgres:5432/patacerta?schema=public&connection_limit=2&pool_timeout=20&connect_timeout=10&socket_timeout=30
      # MinIO — backup-minio.sh usa para mc mirror do bucket uploads,
      # ambos backups usam para enviar para bucket de backups.
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: patacerta
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: patacerta-uploads
      MINIO_BACKUP_BUCKET: ${MINIO_BACKUP_BUCKET:-patacerta-backups}
      # Encriptacao backups — chave publica age. Sem isto, backups falham
      # (script aborta com mensagem clara). Definir no painel Dokploy.
      AGE_RECIPIENT: ${AGE_RECIPIENT:-}
      # Healthchecks.io URLs (opcionais — sem isto, falhas so' aparecem
      # em docker logs).
      HEALTHCHECKS_URL_BACKUP: ${HEALTHCHECKS_URL_BACKUP:-}
      HEALTHCHECKS_URL_BACKUP_MINIO: ${HEALTHCHECKS_URL_BACKUP_MINIO:-}
      HEALTHCHECKS_URL_ROTATE: ${HEALTHCHECKS_URL_ROTATE:-}
      # Politica GFS — defaults sensatos, override apenas se necessario.
      RETENTION_DAILY: ${RETENTION_DAILY:-7}
      RETENTION_WEEKLY: ${RETENTION_WEEKLY:-4}
      RETENTION_MONTHLY: ${RETENTION_MONTHLY:-6}
    entrypoint: ['/app/cron-entrypoint.sh']
    restart: unless-stopped

  # ── PostgreSQL 16 ──
  postgres:
    image: postgres:16-alpine
    networks:
      - default
    environment:
      POSTGRES_USER: patacerta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: patacerta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U patacerta']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (rate-limit + cache) ──
  redis:
    image: redis:7-alpine
    networks:
      - default
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──
  minio:
    image: minio/minio:latest
    networks:
      - default
    environment:
      MINIO_ROOT_USER: patacerta
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3

# Volume prefix: use VOLUME_PREFIX env var to separate stage/prod data.
# Stage:  VOLUME_PREFIX=stage_patacerta (default)
# Prod:   VOLUME_PREFIX=prod_patacerta
# IMPORTANT: Set this BEFORE first deploy, changing later requires data migration.
volumes:
  postgres_data:
    name: ${VOLUME_PREFIX:-stage_patacerta}_postgres_data
  minio_data:
    name: ${VOLUME_PREFIX:-stage_patacerta}_minio_data
  redis_data:
    name: ${VOLUME_PREFIX:-stage_patacerta}_redis_data

networks:
  dokploy-network:
    external: true
