<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="PataCerta">
  <!--
    PataCerta favicon.
    Conceito: pata estilizada (4 dedos + almofada principal) onde a almofada
    aloja um "P" recortado em negative space. Mantemos uma unica cor solida
    (caramel #B8895F) para que o icone fique nitido a 16px. O recorte usa
    fill-rule:evenodd para que o "P" apareca como vazio (cor do bg do browser
    /tab) em vez de exigir um segundo path por cima.
  -->
  <g fill="#B8895F" fill-rule="evenodd">
    <!-- Toe pads (4) — formas de gota orientadas para fora do centro -->
    <ellipse cx="6.5" cy="9" rx="2.6" ry="3.4" transform="rotate(-22 6.5 9)"/>
    <ellipse cx="12" cy="5.5" rx="2.4" ry="3.3"/>
    <ellipse cx="20" cy="5.5" rx="2.4" ry="3.3"/>
    <ellipse cx="25.5" cy="9" rx="2.6" ry="3.4" transform="rotate(22 25.5 9)"/>

    <!--
      Almofada principal + P recortado.
      Outer pad: forma arredondada estilo "feijao" (mais larga em baixo).
      Inner cut-out (sub-path com sentido oposto): silhueta de um "P" serifa.
      O P tem haste vertical centrada um pouco a' esquerda e um bowl arredondado
      em cima a direita; a serifa lê-se nas extremidades superior e inferior da
      haste. Coordenadas escolhidas para ler bem a 16px (linhas >= 1.5px).
    -->
    <path d="
      M 16 12
      C 22.5 12  27 16.5  27 21.5
      C 27 26.5  22.5 29.5  16 29.5
      C 9.5 29.5  5 26.5  5 21.5
      C 5 16.5  9.5 12  16 12
      Z

      M 12.6 16.3
      L 12.6 26.3
      L 14.9 26.3
      L 14.9 22.7
      L 16.9 22.7
      C 19.1 22.7  20.6 21.4  20.6 19.5
      C 20.6 17.6  19.1 16.3  16.9 16.3
      Z

      M 14.9 18.0
      L 16.6 18.0
      C 17.9 18.0  18.6 18.6  18.6 19.5
      C 18.6 20.4  17.9 21.0  16.6 21.0
      L 14.9 21.0
      Z
    "/>
  </g>
</svg>
