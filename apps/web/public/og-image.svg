<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="PataCerta — Criadores Verificados de Cães em Portugal">
  <!--
    OG/Twitter card image (1200x630).
    Cores: caramel-700 (#8F6541) sobre cream/surface (#FAF6F0).
    Fontes: usamos system stack (sans-serif para o slogan, serif para o nome)
    porque o SVG é renderizado server-side por crawlers e não devemos depender
    de webfonts. Se algum crawler ignorar SVG, ver TODO em apps/web/public/README.md.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF6F0"/>
      <stop offset="1" stop-color="#F0E6D6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pata estilizada (versão ampliada do paw.svg) -->
  <g fill="#8F6541" fill-rule="evenodd" transform="translate(120 165) scale(9)">
    <ellipse cx="6.5" cy="9" rx="2.6" ry="3.4" transform="rotate(-22 6.5 9)"/>
    <ellipse cx="12" cy="5.5" rx="2.4" ry="3.3"/>
    <ellipse cx="20" cy="5.5" rx="2.4" ry="3.3"/>
    <ellipse cx="25.5" cy="9" rx="2.6" ry="3.4" transform="rotate(22 25.5 9)"/>
    <path d="M 16 12 C 22.5 12 27 16.5 27 21.5 C 27 26.5 22.5 29.5 16 29.5 C 9.5 29.5 5 26.5 5 21.5 C 5 16.5 9.5 12 16 12 Z M 12.6 16.3 L 12.6 26.3 L 14.9 26.3 L 14.9 22.7 L 16.9 22.7 C 19.1 22.7 20.6 21.4 20.6 19.5 C 20.6 17.6 19.1 16.3 16.9 16.3 Z M 14.9 18.0 L 16.6 18.0 C 17.9 18.0 18.6 18.6 18.6 19.5 C 18.6 20.4 17.9 21.0 16.6 21.0 L 14.9 21.0 Z"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="500" y="280" font-family="Lora, Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" fill="#3D2C1F">PataCerta</text>
  <text x="500" y="345" font-family="'Open Sans', Arial, sans-serif" font-size="36" font-weight="500" fill="#5F4633">Criadores verificados de cães</text>
  <text x="500" y="395" font-family="'Open Sans', Arial, sans-serif" font-size="36" font-weight="500" fill="#5F4633">em Portugal</text>

  <!-- Selo "Adopção responsável" -->
  <g transform="translate(500 460)">
    <rect width="370" height="56" rx="28" fill="#8F6541"/>
    <text x="185" y="37" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6F0">◆ Adopção responsável</text>
  </g>

  <!-- URL no rodapé -->
  <text x="600" y="585" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="22" font-weight="400" fill="#7B5A40" letter-spacing="2">patacerta.pt</text>
</svg>
